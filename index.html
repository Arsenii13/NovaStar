<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Star</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:#020617;
position:sticky;
top:0;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
}

.hero{
text-align:center;
padding:120px 20px;
background:linear-gradient(135deg,#0ea5e9,#6366f1);
}

.hero h1{
font-size:50px;
}

.btn{
background:white;
color:black;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
}

.section{
padding:60px 20px;
max-width:1000px;
margin:auto;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

input, textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
}

#chat{
position:fixed;
bottom:20px;
right:20px;
width:300px;
background:#1e293b;
border-radius:10px;
padding:10px;
}

#messages{
height:200px;
overflow:auto;
font-size:14px;
}

</style>
</head>

<body>

<header>
<div class="logo">Nova Star</div>
<nav>
<a href="#services">Услуги</a>
<a href="#contact">Поръчка</a>
</nav>
</header>

<section class="hero">
<h1>Nova Star</h1>
<p>Професионални сайтове и приложения</p>
<a href="#contact" class="btn">Поръчай</a>
</section>

<section id="services" class="section">
<h2>Услуги</h2>
<div class="services">
<div class="card">🌐 Уебсайтове</div>
<div class="card">📱 Приложения</div>
<div class="card">🎮 Игри</div>
<div class="card">⚙️ Поддръжка</div>
</div>
</section>

<section id="contact" class="section">
<h2>Поръчка</h2>

<form id="orderForm">
<input type="text" placeholder="Име" name="name" required>
<input type="email" placeholder="Email" name="email" required>
<textarea placeholder="Какво искате?" name="message"></textarea>
<button class="btn" type="submit">Изпрати</button>
</form>

<p id="status"></p>

</section>

<!-- AI Chat -->
<div id="chat">
<div id="messages"></div>
<input id="chatInput" placeholder="Попитай..." />
</div>

<script>

// ===== ФОРМА =====
document.getElementById("orderForm").addEventListener("submit", async e=>{
e.preventDefault();

let data = Object.fromEntries(new FormData(e.target));

let res = await fetch("http://localhost:5000/order",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
});

document.getElementById("status").innerText="Изпратено!";
});


// ===== AI ЧАТ (прост) =====
const messages = document.getElementById("messages");

function addMsg(text, me=false){
let div=document.createElement("div");
div.textContent=(me?"Ти: ":"AI: ")+text;
messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
}

document.getElementById("chatInput").addEventListener("keydown",e=>{
if(e.key==="Enter"){
let text=e.target.value;
addMsg(text,true);

let reply="Не разбирам. Попитай за сайт, цена или услуга.";

if(text.includes("цена")) reply="Сайт започва от 100лв.";
if(text.includes("сайт")) reply="Правим модерни сайтове!";
if(text.includes("приложение")) reply="Да, правим и приложения.";

setTimeout(()=>addMsg(reply),500);

e.target.value="";
}
});

</script>

</body>
</html>
